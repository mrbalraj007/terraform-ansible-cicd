# ============================================================
# roles/common/tasks/main.yml
# ============================================================

---
- name: Update all packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true

- name: Install common utilities
  ansible.builtin.dnf:
    name:
      - wget
      - unzip
      - git
    state: present
  # NOTE: curl is intentionally excluded — Amazon Linux 2023 ships
  # curl-minimal, which conflicts with the full curl package.

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC

- name: Ensure /etc/motd shows instance info
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    mode: "0644"
