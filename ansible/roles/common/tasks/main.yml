# ══════════════════════════════════════════════════════════════════════════════
# roles/common/tasks/main.yml
#
# OS-agnostic common setup tasks.
# Uses the {{ package_manager }} variable (set in group_vars/tag_OS_Type_*.yml)
# to automatically select the right package manager for each OS.
# ══════════════════════════════════════════════════════════════════════════════

---
# ── Package Manager Detection ───────────────────────────────────────────────
- name: "Set package manager facts based on OS family"
  ansible.builtin.set_fact:
    pkg_mgr: "{{ 'apt' if ansible_os_family == 'Debian' else 'dnf' if ansible_os_family == 'RedHat' and ansible_distribution_major_version | int >= 8 else 'yum' }}"
    cache_valid: "{{ 3600 if ansible_os_family == 'Debian' else omit }}"
  when: ansible_os_family != "Windows"

# ── Package Updates ─────────────────────────────────────────────────────────
- name: "Update all packages (Debian/Ubuntu)"
  ansible.builtin.apt:
    name: "*"
    state: latest
    update_cache: true
    cache_valid_time: "{{ cache_valid | default(3600) }}"
  when: ansible_os_family == "Debian"

- name: "Update all packages (RedHat/Amazon Linux)"
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  when: ansible_os_family == "RedHat"

# ── Common Utilities ────────────────────────────────────────────────────────
- name: "Install common utilities (Debian/Ubuntu)"
  ansible.builtin.apt:
    name: "{{ common_packages | default(['wget', 'unzip', 'git', 'curl']) }}"
    state: present
  when: ansible_os_family == "Debian"

- name: "Install common utilities (RedHat/Amazon Linux)"
  ansible.builtin.dnf:
    name: >-
      {{ (common_packages | default(['wget', 'unzip', 'git'])) +
         (['curl-minimal'] if ansible_distribution == 'Amazon' and ansible_distribution_major_version | int >= 2023 else ['curl']) }}
    state: present
    # On Amazon Linux 2023, avoid the curl <-> curl-minimal package conflict
    # by using --allowerasing to swap curl for curl-minimal when necessary.
    allowerasing: "{{ true if ansible_distribution == 'Amazon' and ansible_distribution_major_version | int >= 2023 else false }}"
  when: ansible_os_family == "RedHat"

# ── Timezone ────────────────────────────────────────────────────────────────
- name: "Set timezone to UTC"
  community.general.timezone:
    name: "{{ timezone | default('UTC') }}"
  when: ansible_os_family != "Windows"

# ── MOTD ────────────────────────────────────────────────────────────────────
- name: "Ensure /etc/motd shows instance info"
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    mode: "0644"
  when: ansible_os_family != "Windows"
