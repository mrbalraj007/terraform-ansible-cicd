---
# Support both Debian/Ubuntu (apt) and RedHat/Amazon Linux (dnf)
- name: Install Nginx (Debian/Ubuntu)
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install Nginx (RedHat/Amazon Linux)
  ansible.builtin.dnf:
    name: nginx
    state: present
  when: ansible_os_family == "RedHat"

- name: Deploy index.html from template
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ web_server_root | default('/usr/share/nginx/html') }}/index.html"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Nginx

- name: Ensure Nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Ensure nginx is listening on port 80
  ansible.builtin.wait_for:
    port: 80
    host: "0.0.0.0"
    timeout: 10
