---
- name: Install Java 17 JDK (includes javac)
  ansible.builtin.dnf:
    name: java-17-amazon-corretto-devel
    state: present

- name: Ensure app directory exists
  ansible.builtin.file:
    path: /opt/app
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Deploy SimpleHttpServer.java source
  ansible.builtin.copy:
    src: SimpleHttpServer.java
    dest: /opt/app/SimpleHttpServer.java
    owner: ec2-user
    group: ec2-user
    mode: "0644"
  notify: Restart app service

- name: Compile SimpleHttpServer.java
  ansible.builtin.command:
    cmd: javac SimpleHttpServer.java
    chdir: /opt/app
    creates: /opt/app/SimpleHttpServer.class
  notify: Restart app service

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: app.service.j2
    dest: /etc/systemd/system/app.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart app service

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Ensure app service is started and enabled
  ansible.builtin.systemd:
    name: app
    state: started
    enabled: true

- name: Wait for app server to listen on port 8080
  ansible.builtin.wait_for:
    port: 8080
    host: "0.0.0.0"
    timeout: 30
