# ══════════════════════════════════════════════════════════════════════════════
# roles/windows_common/tasks/main.yml
#
# Common configuration for Windows Server instances.
# This role is applied to all Windows instances, regardless of role.
# ══════════════════════════════════════════════════════════════════════════════

---
# ── Windows Update Configuration ────────────────────────────────────────────
- name: "Configure Windows Update to auto-install"
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update
    name: AUOptions
    data: 4
    type: dword

# ── Timezone ────────────────────────────────────────────────────────────────
- name: "Set timezone to UTC"
  ansible.windows.win_timezone:
    timezone: UTC

# ── PowerShell Execution Policy ─────────────────────────────────────────────
- name: "Set PowerShell execution policy to RemoteSigned"
  ansible.windows.win_shell: Set-ExecutionPolicy RemoteSigned -Scope LocalMachine -Force
  changed_when: false

# ── Temporary Files Cleanup ─────────────────────────────────────────────────
- name: "Clean up temporary files"
  ansible.windows.win_shell: |
    $folders = @("$env:TEMP", "$env:WINDIR\Temp")
    foreach ($folder in $folders) {
      if (Test-Path $folder) {
        Get-ChildItem -Path $folder -Recurse -Force -ErrorAction SilentlyContinue |
          Where-Object { $_.LastWriteTime -lt (Get-Date).AddDays(-7) } |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
      }
    }
  changed_when: false

# ── RDP Configuration ───────────────────────────────────────────────────────
- name: "Enable RDP (if not already enabled)"
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server
    name: fDenyTSConnections
    data: 0
    type: dword

- name: "Allow RDP in Windows Firewall"
  ansible.windows.win_firewall_rule:
    name: RDP-TCP-In
    localport: 3389
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: true

# ── Disable IE Enhanced Security (dev/staging only) ─────────────────────────
- name: "Disable IE Enhanced Security Configuration"
  ansible.windows.win_regedit:
    path: "{{ item.path }}"
    name: "{{ item.name }}"
    data: 0
    type: dword
  when: tags.Environment | default('dev') != 'prod'
  loop:
    - { path: "HKLM:\\SOFTWARE\\Microsoft\\Active Setup\\Installed Components\\{A509B1A7-37EF-4b3f-8CFC-4F3A74704073}", name: IsInstalled }
    - { path: "HKLM:\\SOFTWARE\\Microsoft\\Active Setup\\Installed Components\\{A509B1A8-37EF-4b3f-8CFC-4F3A74704073}", name: IsInstalled }