[defaults]
inventory           = aws_ec2.yml
host_key_checking   = False
deprecation_warnings = False
retry_files_enabled = False
stdout_callback     = default
result_format       = yaml
callbacks_enabled   = profile_tasks
roles_path          = roles/

# SSH key path — GitHub Actions writes the private key here
private_key_file    = ~/.ssh/deployer_key

# Default remote user — OS-specific overrides are in group_vars/tag_OS_Type_*.yml
remote_user         = ec2-user

[ssh_connection]
ssh_args            = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30
pipelining          = True

[winrm]
# Windows connection timeout (in seconds)
ansible_winrm_connection_timeout = 60
ansible_winrm_read_timeout = 120