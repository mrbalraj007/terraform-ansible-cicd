# ══════════════════════════════════════════════════════════════════════════════
# os_ubuntu.yml — Ubuntu 24.04 LTS Configuration Playbook
#
# Run as a standalone playbook or imported via site.yml.
# Targets hosts in the tag_OS_Type_ubuntu group.
# Uses apt package manager.
# ══════════════════════════════════════════════════════════════════════════════

- name: "Ubuntu OS Configuration"
  hosts: tag_OS_Type_ubuntu
  become: true
  gather_facts: true

  tasks:
    # ── Package Management ────────────────────────────────────────────────
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Upgrade all packages"
      ansible.builtin.apt:
        name: "*"
        state: latest

    - name: "Install common utilities"
      ansible.builtin.apt:
        name:
          - wget
          - unzip
          - git
          - curl
          - tree
          - htop
          - software-properties-common
        state: present

    # ── Timezone ──────────────────────────────────────────────────────────
    - name: "Set timezone to UTC"
      community.general.timezone:
        name: "{{ timezone | default('UTC') }}"

    # ── MOTD ──────────────────────────────────────────────────────────────
    - name: "Ensure /etc/motd shows instance info"
      ansible.builtin.template:
        src: motd.j2
        dest: /etc/motd
        mode: "0644"

    # ── UFW Firewall ──────────────────────────────────────────────────────
    - name: "Allow SSH through UFW"
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: "Allow HTTP through UFW"
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp
      when: "'web' in group_names or 'app' in group_names"

    - name: "Enable UFW"
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    # ── Web Server (conditional on role) ──────────────────────────────────
    - name: "Install web server (if role is web or app)"
      ansible.builtin.apt:
        name: "{{ web_server_package | default('nginx') }}"
        state: present
      when: "'web' in group_names or 'app' in group_names or tags.Role is defined and tags.Role in ['web', 'app']"

    - name: "Deploy web content"
      ansible.builtin.template:
        src: index.html.j2
        dest: "{{ web_server_root | default('/var/www/html') }}/index.html"
        owner: www-data
        group: www-data
        mode: "0644"
      when: "'web' in group_names or 'app' in group_names"
      notify: "Restart Nginx"

    - name: "Ensure web server is started and enabled"
      ansible.builtin.service:
        name: "{{ web_server_service | default('nginx') }}"
        state: started
        enabled: true
      when: "'web' in group_names or 'app' in group_names"

    - name: "Verify web server is listening on port 80"
      ansible.builtin.wait_for:
        port: 80
        host: "0.0.0.0"
        timeout: 10
      when: "'web' in group_names or 'app' in group_names"
