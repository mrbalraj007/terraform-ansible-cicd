# ─────────────────────────────────────────────────────────────────────────────
# Windows specific connection & package variables
# ─────────────────────────────────────────────────────────────────────────────

# User created by configure-winrm.ps1 (runs via user_data at boot)
ansible_user: ansible_admin
ansible_password: "{{ winrm_password | default('') }}"
ansible_connection: winrm
ansible_winrm_server_cert_validation: ignore
ansible_winrm_transport: basic
ansible_winrm_scheme: https
ansible_port: 5986
ansible_winrm_connection_timeout: 60
ansible_winrm_operation_timeout_sec: 60
ansible_winrm_read_timeout_sec: 90
ansible_become: true
ansible_become_method: runas
ansible_become_user: SYSTEM

# Package manager
package_manager: chocolatey

# Web server
web_server_package: IIS
web_server_service: W3SVC
web_server_root: C:\inetpub\wwwroot
