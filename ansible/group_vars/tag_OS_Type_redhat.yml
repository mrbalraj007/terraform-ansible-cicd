# ─────────────────────────────────────────────────────────────────────────────
# Red Hat Enterprise Linux specific connection & package variables
# ─────────────────────────────────────────────────────────────────────────────

ansible_user: ec2-user
ansible_become: true
ansible_become_method: sudo

# Package manager
package_manager: dnf
update_cache: true

# Web server
web_server_package: nginx
web_server_service: nginx
web_server_root: /usr/share/nginx/html

# System
timezone: UTC
