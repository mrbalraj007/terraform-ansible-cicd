# ============================================================
# .github/workflows/cicd.yml
#
# Pipeline:
#   1. terraform-provision  → creates EC2 instances
#   2. ansible-configure    → dynamic inventory + run playbook
#   3. destroy (manual)     → tear down infrastructure
# ============================================================

name: Terraform + Ansible CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - destroy

env:
  AWS_REGION:       us-east-1
  TF_VERSION:       1.7.5
  ANSIBLE_VERSION:  "9.5.1"
  WORKING_DIR_TF:   terraform
  WORKING_DIR_ANS:  ansible

permissions:
  id-token: write     # Required for OIDC (if using IAM OIDC)
  contents: read

# ── ─────────────────────────────────────────────────────── ──
# JOB 1 — Terraform Provision
# ── ─────────────────────────────────────────────────────── ──
jobs:
  terraform-provision:
    name: "🏗️ Terraform Provision"
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'

    outputs:
      instance_ids: ${{ steps.tf_outputs.outputs.instance_ids }}

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR_TF }}

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── AWS Credentials (static keys — swap for OIDC if preferred) ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Terraform Setup ────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false   # Disable wrapper so outputs parse cleanly

      # ── Terraform Init ─────────────────────────────────────
      - name: Terraform Init
        run: terraform init

      # ── Terraform Format Check ─────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── Terraform Validate ─────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── Terraform Plan ─────────────────────────────────────
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="environment=dev" \
            -out=tfplan
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}

      # ── Terraform Apply (only on push to main or manual deploy) ──
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan

      # ── Capture Outputs ────────────────────────────────────
      - name: Capture Terraform Outputs
        id: tf_outputs
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          INSTANCE_IDS=$(terraform output -json instance_ids)
          echo "instance_ids=${INSTANCE_IDS}" >> "$GITHUB_OUTPUT"
          echo "### Terraform Outputs" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          terraform output >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ── ─────────────────────────────────────────────────────── ──
  # JOB 2 — Ansible Configure
  # ── ─────────────────────────────────────────────────────── ──
  ansible-configure:
    name: "⚙️ Ansible Configure"
    runs-on: ubuntu-latest
    needs: terraform-provision
    if: >
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      github.event.inputs.action != 'destroy'

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR_ANS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── AWS Credentials (Ansible needs these for dynamic inventory) ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Python + Ansible ───────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and AWS dependencies
        run: |
          pip install --upgrade pip
          pip install \
            ansible==${{ env.ANSIBLE_VERSION }} \
            boto3 \
            botocore

      # ── Ansible Collections ────────────────────────────────
      - name: Install Ansible Collections
        run: ansible-galaxy collection install -r requirements.yml

      # ── Write SSH private key to temp file ────────────────
      - name: Write SSH private key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ansible_ssh_key
          chmod 600 /tmp/ansible_ssh_key

      # ── Wait for EC2 instances to be reachable ─────────────
      - name: Wait for EC2 instances to be SSH-ready
        run: |
          echo "Waiting 30s for instances to initialise..."
          sleep 30
          # Verify dynamic inventory resolves at least 1 host
          ansible-inventory -i inventory/aws_ec2.yml --list | \
            python3 -c "
          import sys, json
          inv = json.load(sys.stdin)
          hosts = inv.get('_meta', {}).get('hostvars', {})
          print(f'Discovered {len(hosts)} host(s): {list(hosts.keys())}')
          if not hosts:
              print('ERROR: No hosts discovered!')
              sys.exit(1)
          "

      # ── Ansible Dry Run (Check Mode) ───────────────────────
      - name: Ansible Playbook — Check Mode
        run: |
          ansible-playbook site.yml --check --diff
        env:
          ANSIBLE_FORCE_COLOR: "1"
        continue-on-error: true   # Check mode is informational only

      # ── Ansible Apply ──────────────────────────────────────
      - name: Ansible Playbook — Apply
        run: |
          ansible-playbook site.yml -v
        env:
          ANSIBLE_FORCE_COLOR: "1"

      # ── Print Job Summary ──────────────────────────────────
      - name: Job Summary
        if: always()
        run: |
          echo "### Ansible Run Summary" >> "$GITHUB_STEP_SUMMARY"
          ansible-inventory -i inventory/aws_ec2.yml --list | \
            python3 -c "
          import sys, json
          inv = json.load(sys.stdin)
          hosts = inv.get('_meta', {}).get('hostvars', {})
          print('| Host | Public IP |')
          print('|------|-----------|')
          for h, v in hosts.items():
              print(f'| {h} | {v.get(\"public_ip_address\",\"N/A\")} |')
          " >> "$GITHUB_STEP_SUMMARY"

      # ── Cleanup SSH key ────────────────────────────────────
      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/ansible_ssh_key

  # ── ─────────────────────────────────────────────────────── ──
  # JOB 3 — Destroy (manual trigger only)
  # ── ─────────────────────────────────────────────────────── ──
  terraform-destroy:
    name: "💥 Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment: destroy-approval   # Requires manual approval in GitHub Environments

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR_TF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -auto-approve
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
