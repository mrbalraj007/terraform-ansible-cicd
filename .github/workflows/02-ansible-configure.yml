name: "2 - Ansible Configure Instances"

on:
  workflow_call:
    secrets:
      AWS_IAM_ROLE_ARN:
        required: true
      SSH_PRIVATE_KEY:
        required: true

  # Triggered automatically after Terraform Apply succeeds
  workflow_run:
    workflows: ["1 - Terraform Provision Infrastructure"]
    types: [completed]
    branches: [main]

  # Also allow manual trigger
  workflow_dispatch:
    inputs:
      limit:
        description: "Ansible --limit (e.g. tag_OS_Type_ubuntu, tag_Role_web, all)"
        required: false
        default: "all"
      tags:
        description: "Ansible --tags to run specific tasks"
        required: false
        default: ""

env:
  AWS_REGION: "us-east-1"
  ANSIBLE_WORKING_DIR: "./ansible"

permissions:
  id-token: write
  contents: read

jobs:
  ansible-configure:
    name: "Run Ansible Playbook (Multi-OS)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Ansible and dependencies
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible boto3 botocore pywinrm
          ansible-galaxy collection install -r requirements.yml

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deployer_key
          chmod 600 ~/.ssh/deployer_key

      - name: Wait for EC2 instances to be ready
        run: |
          echo "Waiting for EC2 instances to fully initialize..."
          echo "  Linux instances: ~60s for SSH"
          echo "  Windows instances: ~180s for WinRM"
          sleep 180

      - name: Test dynamic inventory — list all groups
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        run: |
          echo "### Dynamic Inventory Groups" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ansible-inventory -i aws_ec2.yml --graph >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "───────────────────────────────────"
          echo "Full inventory groups:"
          ansible-inventory -i aws_ec2.yml --graph
          echo "───────────────────────────────────"
          echo "Host details:"
          ansible-inventory -i aws_ec2.yml --list | python3 -c "
import json, sys
inv = json.load(sys.stdin)
hosts = inv.get('_meta', {}).get('hostvars', {})
groups = {k: v for k, v in inv.items() if k != '_meta'}
print('Groups:', list(groups.keys()))
for h, v in hosts.items():
    tags = v.get('tags', {})
    print(f'  {h}  OS={tags.get(\"OS_Type\",\"?\")}  Role={tags.get(\"Role\",\"?\")}  Env={tags.get(\"Environment\",\"?\")}')
"

      - name: Test SSH connectivity (Linux hosts)
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        run: |
          # Test connectivity to Linux hosts (Amazon Linux, Ubuntu, RedHat)
          for group in tag_OS_Type_amazon_linux tag_OS_Type_ubuntu tag_OS_Type_redhat; do
            if ansible-inventory -i aws_ec2.yml --list | python3 -c "
import json, sys
inv = json.load(sys.stdin)
if '$group' in inv and inv['$group'].get('hosts'):
    sys.exit(0)
else:
    sys.exit(1)
"; then
              echo "Testing SSH to group: $group"
              ansible "$group" -i aws_ec2.yml -m ping --private-key ~/.ssh/deployer_key || true
            else
              echo "No hosts in group: $group (skipping)"
            fi
          done

      - name: Test WinRM connectivity (Windows hosts)
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        run: |
          if ansible-inventory -i aws_ec2.yml --list | python3 -c "
import json, sys
inv = json.load(sys.stdin)
if 'tag_OS_Type_windows' in inv and inv['tag_OS_Type_windows'].get('hosts'):
    sys.exit(0)
else:
    sys.exit(1)
"; then
            echo "Testing WinRM to Windows instances..."
            ansible tag_OS_Type_windows -i aws_ec2.yml -m ansible.windows.win_ping || echo "WinRM test completed (may fail if WinRM not configured)"
          else
            echo "No Windows hosts found (skipping WinRM test)"
          fi
        continue-on-error: true

      - name: Run Ansible playbook (site.yml orchestration)
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        run: |
          LIMIT="${{ github.event.inputs.limit || 'all' }}"
          TAGS="${{ github.event.inputs.tags }}"

          CMD="ansible-playbook -i aws_ec2.yml playbooks/site.yml"
          CMD="$CMD --private-key ~/.ssh/deployer_key"
          CMD="$CMD --limit $LIMIT"
          [ -n "$TAGS" ] && CMD="$CMD --tags $TAGS"
          CMD="$CMD -v"

          echo "Running: $CMD"
          eval $CMD

      - name: Verify web servers are responding
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        if: always()
        run: |
          # Check Linux web servers (SSH-based)
          for group in tag_Role_web tag_Role_app; do
            if ansible-inventory -i aws_ec2.yml --list | python3 -c "
import json, sys
inv = json.load(sys.stdin)
if '$group' in inv and inv['$group'].get('hosts'):
    sys.exit(0)
sys.exit(1)
"; then
              echo "Checking HTTP on group: $group"
              ansible "$group" -i aws_ec2.yml \
                --private-key ~/.ssh/deployer_key \
                -m uri -a "url=http://{{ ansible_host }} return_content=yes" \
                -u "{{ hostvars[inventory_hostname].ansible_user | default('ec2-user') }}" \
                2>&1 || echo "Note: some hosts may not be web servers"
            fi
          done

      - name: Deployment Summary
        if: always()
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        run: |
          echo "### Ansible Run Summary (Multi-OS)" >> $GITHUB_STEP_SUMMARY
          echo '| OS Type | Host | Public IP | Ansible Reachable |' >> $GITHUB_STEP_SUMMARY
          echo '|---------|------|-----------|-------------------|' >> $GITHUB_STEP_SUMMARY
          ansible-inventory -i aws_ec2.yml --list | python3 -c "
import json, sys
inv = json.load(sys.stdin)
hosts = inv.get('_meta', {}).get('hostvars', {})
for h, v in hosts.items():
    tags = v.get('tags', {})
    os_type = tags.get('OS_Type', '?')
    ip = v.get('public_ip_address', 'N/A')
    print(f'| {os_type} | {h} | {ip} | ✅ |')
" >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deployer_key