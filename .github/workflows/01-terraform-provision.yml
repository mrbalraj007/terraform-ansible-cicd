name: "1 - Terraform Provision Infrastructure"

on:
  workflow_call:
    secrets:
      AWS_IAM_ROLE_ARN:
        required: true
      SSH_PUBLIC_KEY:
        required: true

  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]
      ssh_public_key:
        description: "SSH public key content (from scripts/keys/deployer_key.pub)"
        required: true

env:
  TF_VERSION: "latest"
  AWS_REGION: "us-east-1"
  TF_WORKING_DIR: "./terraform"

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================================================
  # Job 1: Validate & Plan
  # ==========================================================================
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    outputs:
      tfplan_exitcode: ${{ steps.plan.outputs.exitcode }}
      has_servers: ${{ steps.parse-servers.outputs.has_servers }}
      server_count: ${{ steps.parse-servers.outputs.server_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Parse server definitions for summary
        id: parse-servers
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if grep -q "^servers" terraform.tfvars; then
            echo "has_servers=true" >> $GITHUB_OUTPUT
            COUNT=$(grep -c "os_type" terraform.tfvars || true)
            echo "server_count=$COUNT" >> $GITHUB_OUTPUT
            echo "### Server Inventory" >> $GITHUB_STEP_SUMMARY
            echo '| # | Name | OS Type | Instance Type | Count | Volume Size | Role |' >> $GITHUB_STEP_SUMMARY
            echo '|---|------|---------|---------------|-------|-------------|------|' >> $GITHUB_STEP_SUMMARY
            python3 ../scripts/parse-servers-to-summary.py >> $GITHUB_STEP_SUMMARY
          else
            echo "has_servers=false" >> $GITHUB_OUTPUT
            echo "server_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY || github.event.inputs.ssh_public_key }}
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -detailed-exitcode || echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  # ==========================================================================
  # Job 2: Apply (only on main push or manual apply)
  # ==========================================================================
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event.inputs.action == 'apply')
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY || github.event.inputs.ssh_public_key }}
        run: terraform apply -auto-approve tfplan

      - name: Save Terraform outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform output -json > ../terraform-outputs.json
          echo "### Provisioned Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python3 ../scripts/outputs-to-summary.py < ../terraform-outputs.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ../terraform-outputs.json

      - name: Upload Terraform outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform-outputs.json
          retention-days: 7

      - name: Generate Ansible inventory metadata
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform output -json | python3 ../scripts/generate-ansible-host-map.py

  # ==========================================================================
  # Job 3: Destroy (manual only)
  # ==========================================================================
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy \
            -var-file="terraform.tfvars" \
            -auto-approve

      - name: Clear Terraform state to force fresh resource creation
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "Removing all resources from state after destroy..."
          for resource in $(terraform state list 2>/dev/null || true); do
            echo "Removing from state: $resource"
            terraform state rm "$resource" 2>/dev/null || true
          done
          echo "State cleared. Next apply will create fresh resources with correct key pair."