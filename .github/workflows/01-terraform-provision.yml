name: "1 - Terraform Provision Infrastructure"

"on":
  # ── Called by 03-full-cicd.yml (PR merge to main) — runs plan + apply ──
  workflow_call:
    secrets:
      AWS_IAM_ROLE_ARN:
        required: true
      TF_VAR_WINRM_PASSWORD:
        required: false

  # ── Manual trigger (plan or destroy only — apply must go through workflow_call) ──
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - destroy

env:
  TF_VERSION: "latest"
  AWS_REGION: "us-east-1"
  TF_WORKING_DIR: "./terraform"
  TF_VAR_winrm_password: ${{ secrets.TF_VAR_WINRM_PASSWORD }}
  TF_VAR_tf_state_bucket: ${{ secrets.TF_VAR_TF_STATE_BUCKET }}

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================================================
  # Job 1: Validate & Plan
  # ==========================================================================
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          INIT_ARGS=""
          if [ -n "$TF_VAR_tf_state_bucket" ]; then
            INIT_ARGS="-backend-config=bucket=$TF_VAR_tf_state_bucket"
          fi
          terraform init $INIT_ARGS

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Parse server definitions for summary
        id: parse-servers
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if grep -q "^servers" terraform.tfvars; then
            echo "has_servers=true" >> $GITHUB_OUTPUT
            COUNT=$(grep -c "os_type" terraform.tfvars || true)
            echo "server_count=$COUNT" >> $GITHUB_OUTPUT
            echo "### Server Inventory" >> $GITHUB_STEP_SUMMARY
            echo '| # | Name | OS Type | Instance Type | Count | Volume Size | Role |' >> $GITHUB_STEP_SUMMARY
            echo '|---|------|---------|---------------|-------|-------------|------|' >> $GITHUB_STEP_SUMMARY
            python3 ../scripts/parse-servers-to-summary.py >> $GITHUB_STEP_SUMMARY
          else
            echo "has_servers=false" >> $GITHUB_OUTPUT
            echo "server_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -detailed-exitcode || echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  # ==========================================================================
  # Job 2: Apply — runs when called via workflow_call (from 03-full-cicd.yml)
  # ==========================================================================
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    # workflow_dispatch with action=destroy is handled in terraform-destroy job below.
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          INIT_ARGS=""
          if [ -n "$TF_VAR_tf_state_bucket" ]; then
            INIT_ARGS="-backend-config=bucket=$TF_VAR_tf_state_bucket"
          fi
          terraform init $INIT_ARGS

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Save Terraform outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform output -json > ../terraform-outputs.json
          echo "### Provisioned Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python3 ../scripts/outputs-to-summary.py < ../terraform-outputs.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ../terraform-outputs.json

      - name: Upload Terraform outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform-outputs.json
          retention-days: 7

      - name: Generate Ansible inventory metadata
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform output -json | python3 ../scripts/generate-ansible-host-map.py

  # ==========================================================================
  # Job 3: Destroy — manual only via workflow_dispatch
  # ==========================================================================
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          INIT_ARGS="-reconfigure"
          if [ -n "$TF_VAR_tf_state_bucket" ]; then
            INIT_ARGS="-reconfigure -backend-config=bucket=$TF_VAR_tf_state_bucket"
          fi
          terraform init $INIT_ARGS

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy \
            -var-file="terraform.tfvars" \
            -auto-approve