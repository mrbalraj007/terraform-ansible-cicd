name: "3 - Full CI/CD Pipeline (Provision + Configure)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    name: "Terraform Provision"
    uses: ./.github/workflows/01-terraform-provision.yml
    secrets: inherit

  configure:
    name: "Ansible Configure (Multi-OS)"
    needs: provision
    uses: ./.github/workflows/02-ansible-configure.yml
    secrets: inherit