name: "0 - Terraform Plan (PR Check)"

"on":
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "terraform/**"

env:
  TF_VERSION: "latest"
  AWS_REGION: "us-east-1"
  TF_WORKING_DIR: "./terraform"
  TF_VAR_tf_state_bucket: ${{ secrets.TF_VAR_TF_STATE_BUCKET }}

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if [ -z "$TF_VAR_tf_state_bucket" ]; then
            echo "ERROR: TF_VAR_tf_state_bucket is not set."
            echo "Set TF_VAR_TF_STATE_BUCKET in GitHub repo → Settings → Secrets and Variables → Actions."
            exit 1
          fi
          terraform init \
            -backend-config=bucket=$TF_VAR_tf_state_bucket \
            -backend-config=key=terraform.tfstate \
            -backend-config=region=$AWS_REGION

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if terraform fmt -check -recursive; then
            echo "✓ Formatting OK"
          else
            echo "✗ Formatting issues found — run 'cd terraform && terraform fmt -recursive' locally"
            exit 1
          fi

      - name: Parse server definitions
        id: parse-servers
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if grep -q "^servers" terraform.tfvars; then
            echo "has_servers=true" >> $GITHUB_OUTPUT
            echo "### Server Inventory" >> $GITHUB_STEP_SUMMARY
            echo '| # | Name | OS Type | Instance Type | Count | Volume Size | Role |' >> $GITHUB_STEP_SUMMARY
            echo '|---|------|---------|---------------|-------|-------------|------|' >> $GITHUB_STEP_SUMMARY
            python3 ../scripts/parse-servers-to-summary.py >> $GITHUB_STEP_SUMMARY
          else
            echo "has_servers=false" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -detailed-exitcode 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee /tmp/plan-output.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          exit $PLAN_EXIT

      - name: Terraform Plan Summary (Table)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform show -json tfplan | python3 ../scripts/plan-resource-table.py

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfplan-pr-${{ github.event.pull_request.number }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5

      - name: Add Plan Summary Comment to PR
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          {
            echo '## Terraform Plan Summary'
            echo
            echo '### Resource Changes'
            terraform show -json tfplan | python3 ../scripts/plan-resource-table.py
            echo
            echo '### Plan Output'
            echo '```'
            tail -60 /tmp/plan-output.txt
            echo '```'
            echo
            echo "*Plan artifact: tfplan-pr-${PR_NUMBER}*"
          } > /tmp/pr_comment.txt

          gh api --method POST "repos/$REPO/issues/$PR_NUMBER/comments" \
            --field "body=@/tmp/pr_comment.txt"